fragment webhookSnapshotReport on SnapshotReport {
  id
  status
  lighthouseStorageKey
  screencastStorageKey
  flameChartStorageKey
  sourceCoverageStorageKey
  traceEventsStorageKey
  createdAt
  host
  page {
    id
    name
    isE2e
    url
  }
  environment {
    id
    name
  }
  profile {
    id
    name
  }
  failedReason
  snapshot {
    title
    id
  }
  artifacts {
    id
    name
    hash
    branch
  }
}