mutation createWebhookForApplication($applicationId: Int!, $input: WebhookInput!) {
  createWebhookForApplication(applicationId: $applicationId, input: $input) {
    id
    url
    secret
    method
    contentType
    eventType
    lastDelivery {
      startTime
      endTime
      statusCode
      isSuccess
      deliveryId
    }
  }
}
